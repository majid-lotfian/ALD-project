experiment:
name: finetune

data:
real_data_path: data/real/ald_dataset.csv
target_column: severity
batch_size: 16

training:
epochs: 50
early_stopping_patience: 10

cv:
enabled: true
n_splits: 3
shuffle: true
random_state: 42

checkpoint:
save_dir: outputs/checkpoints/finetune
pretrained_path: null     #null → from scratch    or checkpoint path → pretrained initialization