experiment:
  name: pretrain

data:
  input_folders: ["copula"]
  max_rows: null
  synthetic_root: ../synthetic_data/

pretraining:
  mask_ratio: 0.4
  mask_prob: 0.8
  random_replace_prob: 0.1
  keep_prob: 0.1
  epochs: 50
  amp: true
  amp_dtype: bf16
  grad_accum_steps: 1
  clip_grad_norm: 1.0

checkpoint:
  save_dir: outputs/checkpoints/pretrain

validation:
  split_ratio: 0.1