experiment:
  name: pretrain_ctgan_large
  seed: 42

paths:
  output_root: outputs/

data:
  input_folders: ["ctgan"]
  batch_size: 16
  num_workers: 4
  pin_memory: true
  max_files: 2
  sex_col: sex
  id_col: Sample_ID
  exclude_cols: []
  synthetic_root: ../synthetic_data/
  target_column: severity

model:
  d_model: 192
  num_layers: 4
  nhead: 6
  dropout: 0.1
  use_cls: true
  value_hidden_dim: 64
  value_encoder_layers: 2

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0001

validation:
  split_ratio: 0.1

pretraining:
  epochs: 30
  val_fraction: 0.1
  mask_ratio: 0.15
  mask_token_prob: 0.8
  random_replace_prob: 0.1
  keep_original_prob: 0.1
  amp: true
  amp_dtype: bf16
  grad_accum_steps: 2
  clip_grad_norm: 1.0